<!DOCTYPE html>

<body>
     <header class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between bg-white">

  <div class="relative overflow-hidden rounded-2xl sm:rounded-[2rem] shadow-lg h-auto min-h-[320px] md:min-h-[400px] md:aspect-[21/9]">
    
    <img src="./images_abdu/Rectangle 5.png" alt="Campus" class="absolute inset-0 w-full h-full object-cover" />
